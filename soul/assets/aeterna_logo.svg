<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b55fe6" />
      <stop offset="100%" stop-color="#ff2a85" />
    </linearGradient>
    <filter id="neonShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feColorMatrix type="matrix" values="
        1 0 0 0 0.7
        0 1 0 0 0.3
        0 0 1 0 0.9
        0 0 0 1 0
      " />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer glowing border rhomboid -->
  <rect x="26" y="26" width="48" height="48" rx="10" fill="none" stroke="#b55fe6" stroke-width="2.5" stroke-opacity="0.8" transform="rotate(45 50 50)" filter="url(#neonShadow)" />
  <!-- Inner filled glowing rhomboid -->
  <rect x="32" y="32" width="36" height="36" rx="8" fill="url(#purpleGlow)" transform="rotate(45 50 50)" />
  <!-- Core energy pulse -->
  <circle cx="50" cy="50" r="4.5" fill="#ffffff" />
</svg>
