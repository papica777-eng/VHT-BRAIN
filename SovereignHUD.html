<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA // Sovereign Brain Cognitive HUD</title>
    <meta name="description" content="Real-time neurocognitive monitoring dashboard — EEG waveforms, neurotransmitter telemetry, brain region activity, seizure detection with Knox TEE safety.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
           AETERNA SOVEREIGN BRAIN HUD — DESIGN SYSTEM
           ═══════════════════════════════════════════════════ */
        :root {
            --bg-abyss: #030108;
            --bg-deep: #06020f;
            --glass-bg: rgba(12, 5, 28, 0.65);
            --glass-border: rgba(140, 80, 220, 0.12);
            --glass-border-hover: rgba(140, 80, 220, 0.35);
            --glass-glow: rgba(140, 80, 220, 0.2);

            --text-primary: #eef2ff;
            --text-secondary: #8891a8;
            --text-dim: #4a5068;

            --neon-violet: #a855f7;
            --neon-cyan: #06d6e0;
            --neon-emerald: #00ffaa;
            --neon-rose: #ff2a6d;
            --neon-amber: #ffb800;
            --neon-blue: #3b82f6;
            --neon-pink: #ec4899;
            --neon-indigo: #6366f1;

            --glow-violet: rgba(168, 85, 247, 0.3);
            --glow-cyan: rgba(6, 214, 224, 0.3);
            --glow-emerald: rgba(0, 255, 170, 0.25);
            --glow-rose: rgba(255, 42, 109, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-family: 'Outfit', sans-serif; }
        body {
            background: var(--bg-abyss);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            cursor: crosshair;
            background-image:
                radial-gradient(ellipse at 50% -10%, rgba(140,80,220,0.15) 0%, transparent 55%),
                radial-gradient(circle at 15% 85%, rgba(6,214,224,0.04) 0%, transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(255,42,109,0.03) 0%, transparent 35%);
            background-attachment: fixed;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020105; }
        ::-webkit-scrollbar-thumb { background: #1a0f2e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-violet); }

        /* Scanline */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 9999;
            background: linear-gradient(to bottom, rgba(168,85,247,0.2), transparent);
            animation: scan 10s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { transform: translateY(-10px); } 100% { transform: translateY(110vh); } }

        /* Glass card */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .glass::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(140,80,220,0.04), transparent);
            transition: 0.8s;
        }
        .glass:hover::before { left: 100%; }
        .glass:hover { border-color: var(--glass-border-hover); box-shadow: 0 0 30px var(--glass-glow); transform: translateY(-1px); }

        /* Header */
        .hud-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 32px;
            background: rgba(6,2,18,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(140,80,220,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .hud-title {
            font-size: 0.8rem; font-weight: 800; letter-spacing: 2.5px;
            color: var(--neon-violet);
            text-shadow: 0 0 20px var(--glow-violet);
        }
        .header-controls { display: flex; align-items: center; gap: 16px; }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid rgba(0,255,170,0.2); background: rgba(0,255,170,0.05);
            color: var(--neon-emerald);
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: currentColor;
            animation: pulse-dot 1.8s infinite ease-out;
        }
        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 currentColor; }
            70% { box-shadow: 0 0 0 6px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }
        .lang-btn {
            background: rgba(140,80,220,0.08); border: 1px solid rgba(140,80,220,0.2);
            color: var(--text-secondary); padding: 4px 10px; border-radius: 6px;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn.active { background: rgba(140,80,220,0.2); color: #fff; border-color: var(--neon-violet); }
        .lang-btn:hover { color: #fff; border-color: rgba(140,80,220,0.4); }

        /* Main layout */
        .hud-main { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }

        /* Tab system */
        .tab-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(140,80,220,0.03); border: 1px solid var(--glass-border);
            color: var(--text-secondary); padding: 10px 20px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tab-btn.active {
            border-color: var(--neon-violet); color: #fff;
            background: rgba(140,80,220,0.12); box-shadow: 0 0 20px rgba(140,80,220,0.15);
        }
        .tab-btn:hover:not(.active) { color: #fff; border-color: rgba(140,80,220,0.25); }

        /* Metric card mini */
        .metric-card {
            border-radius: 14px; padding: 16px; flex: 1; min-width: 140px;
            background: rgba(12,5,28,0.4); border: 1px solid var(--glass-border);
            transition: all 0.4s ease;
        }
        .metric-card:hover { border-color: var(--glass-border-hover); }
        .metric-label { font-size: 0.65rem; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; }
        .metric-value { font-size: 1.5rem; font-weight: 800; }
        .metric-norm { font-size: 0.55rem; color: var(--text-dim); margin-top: 3px; }

        /* EEG Canvas */
        .eeg-canvas-wrap {
            background: #050210; border: 1px solid rgba(140,80,220,0.06);
            border-radius: 14px; padding: 2px; position: relative; overflow: hidden;
        }
        .eeg-label {
            position: absolute; left: 8px; font-size: 0.55rem; font-weight: 700;
            letter-spacing: 1px; color: var(--text-dim); z-index: 2;
        }

        /* Neurotransmitter bars */
        .nt-bar-wrap { display: flex; flex-direction: column; gap: 10px; }
        .nt-row { display: flex; align-items: center; gap: 10px; }
        .nt-name { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); width: 100px; text-align: right; }
        .nt-track { flex: 1; height: 10px; background: rgba(255,255,255,0.03); border-radius: 6px; overflow: hidden; position: relative; }
        .nt-fill { height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .nt-fill::after { content: ''; position: absolute; right: 0; top: 0; width: 20px; height: 100%; background: rgba(255,255,255,0.15); filter: blur(4px); }
        .nt-val { font-size: 0.65rem; font-weight: 700; width: 55px; text-align: left; }

        /* Brain region grid */
        .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .region-card {
            border-radius: 12px; padding: 14px; background: rgba(12,5,28,0.35);
            border: 1px solid var(--glass-border); transition: all 0.3s;
        }
        .region-card:hover { border-color: var(--glass-border-hover); }
        .region-name { font-size: 0.7rem; font-weight: 700; margin-bottom: 6px; }
        .region-activity {
            font-size: 1.1rem; font-weight: 800;
        }
        .region-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.03); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .region-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

        /* 3D brain canvas */
        #brain-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            opacity: 0.4;
        }

        /* Action buttons */
        .action-btn {
            background: linear-gradient(135deg, var(--neon-violet), var(--neon-pink));
            color: #fff; font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 1.5px; border: none; padding: 12px 28px; border-radius: 40px;
            box-shadow: 0 0 25px rgba(168,85,247,0.3); cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex; align-items: center; gap: 8px;
        }
        .action-btn:hover {
            transform: scale(1.03) translateY(-1px);
            box-shadow: 0 0 35px rgba(0,255,170,0.5);
            background: linear-gradient(135deg, var(--neon-emerald), var(--neon-cyan));
            color: #020105;
        }
        .action-btn:active { transform: scale(0.97); }

        .action-btn.danger {
            background: linear-gradient(135deg, var(--neon-rose), #ff6b3d);
            box-shadow: 0 0 25px var(--glow-rose);
        }
        .action-btn.danger:hover {
            background: linear-gradient(135deg, #ff6b3d, var(--neon-amber));
            box-shadow: 0 0 35px rgba(255,184,0,0.5);
        }

        .action-btn.secondary {
            background: rgba(140,80,220,0.1);
            border: 1px solid rgba(140,80,220,0.3);
            box-shadow: none; color: var(--neon-violet);
        }
        .action-btn.secondary:hover {
            background: rgba(140,80,220,0.2); color: #fff;
            box-shadow: 0 0 15px var(--glow-violet);
        }

        /* Telemetry log */
        .log-container {
            background: #040110; border: 1px solid rgba(140,80,220,0.06);
            border-radius: 12px; padding: 14px; max-height: 200px; overflow-y: auto;
            font-size: 0.7rem; line-height: 1.7;
        }
        .log-time { color: var(--text-dim); margin-right: 8px; }
        .log-msg { color: var(--neon-cyan); }
        .log-msg.warn { color: var(--neon-amber); }
        .log-msg.error { color: var(--neon-rose); }
        .log-msg.success { color: var(--neon-emerald); }

        /* Safety shield */
        .shield-panel {
            padding: 16px 22px; border-radius: 16px; transition: all 0.5s ease;
        }
        .shield-panel.safe {
            border: 2px solid var(--neon-emerald);
            background: rgba(0,255,170,0.04);
            box-shadow: 0 0 20px var(--glow-emerald);
        }
        .shield-panel.alert {
            border: 2px solid var(--neon-rose);
            background: rgba(255,42,109,0.06);
            box-shadow: 0 0 20px var(--glow-rose);
            animation: alert-pulse 1.5s infinite ease-in-out;
        }
        @keyframes alert-pulse {
            0%, 100% { box-shadow: 0 0 20px var(--glow-rose); }
            50% { box-shadow: 0 0 40px var(--glow-rose); }
        }

        /* Dashboard grid */
        .dash-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 24px; align-items: start; }
        .col-stack { display: flex; flex-direction: column; gap: 24px; }

        /* Patient profile table */
        .profile-row {
            display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid rgba(140,80,220,0.06); font-size: 0.8rem;
        }
        .profile-label { color: var(--text-secondary); }
        .profile-value { font-weight: 700; }

        /* Footer */
        .hud-footer {
            padding: 14px 32px; text-align: center;
            font-size: 0.6rem; letter-spacing: 2px; color: var(--text-dim);
            border-top: 1px solid rgba(140,80,220,0.06);
            background: rgba(6,2,18,0.7);
        }

        /* Emergency overlay */
        .emergency-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,2,5,0.96); z-index: 9998;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .emergency-overlay.active { display: flex; }

        /* Responsive */
        @media (max-width: 900px) {
            .dash-grid { grid-template-columns: 1fr; }
            .hud-header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
            .hud-main { padding: 16px; }
            .tab-bar { gap: 6px; }
            .tab-btn { padding: 8px 14px; font-size: 0.65rem; }
        }

        /* Pillar cards */
        .pillar-card {
            border-radius: 16px; padding: 24px; background: rgba(12,5,28,0.4);
            border: 1px solid var(--glass-border); transition: all 0.4s ease;
        }
        .pillar-card:hover { border-color: var(--glass-border-hover); transform: translateY(-2px); box-shadow: 0 0 25px var(--glass-glow); }
        .pillar-num { font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; color: var(--neon-violet); margin-bottom: 8px; }
        .pillar-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 8px; }
        .pillar-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }
    </style>
</head>

    function triggerCure() {
        if (S.transitioning || S.cured) return;
        S.transitioning = true;
        addLog('BIO_CURE: Инициране на невро-когнитивна хомеостаза...', 'BIO_CURE: Initiating neurocognitive homeostasis...', 'success');
        let step = 0, steps = 60;
        const timer = setInterval(() => {
            step++;
            const p = step / steps;
            S.entropy = parseFloat((2.84 * (1 - p) + 0.02 * p).toFixed(3));
            S.seizureZScore = parseFloat((0.8 * (1 - p) + 0.12 * p).toFixed(2));
            S.glutamate = Math.round(35 * (1 - p) + 18 * p);
            S.gaba = Math.round(81 * (1 - p) + 95 * p);
            S.dopamine = Math.round(72 * (1 - p) + 88 * p);
            S.serotonin = Math.round(68 * (1 - p) + 92 * p);
            S.bdnf = parseFloat((1.2 * (1 - p) + 2.8 * p).toFixed(2));
            S.hebbianCoherence = parseFloat((8.4 * (1 - p) + 9.8 * p).toFixed(1));
            S.prefrontal = Math.round(78 * (1 - p) + 92 * p);
            S.hippocampus = Math.round(65 * (1 - p) + 88 * p);
            if (step >= steps) {
                clearInterval(timer);
                S.cured = true; S.transitioning = false; S.catuskoti = 'HARMONY';
                addLog('SUCCESS: Невро-когнитивна хомеостаза: ПОСТИГНАТА. 0 припадъци.', 'SUCCESS: Neurocognitive homeostasis: ACHIEVED. 0 seizures.', 'success');
            }
            render();
        }, 50);
    }

    // ═══════════════════════════════════════════════════
    //  EEG WAVEFORM ENGINE (Canvas 2D)
    // ═══════════════════════════════════════════════════
    const eegCanvases = {};
    function updateEEG() {
        const bands = {
            delta: { freq: 2, amp: S.delta, color: '#6366f1' },
            theta: { freq: 6, amp: S.theta, color: '#06d6e0' },
            alpha: { freq: 10, amp: S.alpha, color: '#00ffaa' },
            beta:  { freq: 22, amp: S.beta,  color: '#ffb800' },
            gamma: { freq: 50, amp: S.gamma, color: '#ff2a6d' }
        };
        S.tick++;
        for (let band in bands) {
            const b = bands[band];
            const noise = (Math.random() - 0.5) * b.amp * 0.4;
            const seizureBoost = S.seizureActive && (band === 'gamma' || band === 'beta') ? Math.random() * 40 : 0;
            const val = Math.sin(S.tick * b.freq * 0.02) * b.amp * 0.5 + noise + seizureBoost;
            S.eegHistory[band].push(val);
            if (S.eegHistory[band].length > 300) S.eegHistory[band].shift();

            const canvas = document.getElementById('eeg-' + band);
            if (!canvas) continue;
            const ctx = canvas.getContext('2d');
            const w = canvas.width = canvas.offsetWidth * 2;
            const h = canvas.height = canvas.offsetHeight * 2;
            ctx.clearRect(0, 0, w, h);

            // Grid
            ctx.strokeStyle = 'rgba(140,80,220,0.06)';
            ctx.lineWidth = 1;
            for (let y = 0; y < h; y += h / 4) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

            // Waveform
            const data = S.eegHistory[band];
            ctx.strokeStyle = b.color;
            ctx.lineWidth = 2;
            ctx.shadowColor = b.color;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            for (let i = 0; i < data.length; i++) {
                const x = (i / data.length) * w;
                const y = h / 2 - data[i] * (h / 120);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    // ═══════════════════════════════════════════════════
    //  BACKGROUND BRAIN SHADER (WebGL)
    // ═══════════════════════════════════════════════════
    function initBrainShader() {
        const canvas = document.getElementById('brain-canvas');
        const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false });
        if (!gl) return;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const vs = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;
        const fs = `
        precision mediump float;
        uniform float t;
        uniform vec2 r;

        float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}

        float brain(vec3 p){
            // Main brain sphere
            float d=length(p)-1.0;
            // Hemispheres split
            d=max(d,-abs(p.x)-0.02+1.0);
            // Frontal lobe bulge
            float fr=length(p-vec3(0,.2,.8))-0.7;
            d=smin(d,fr,0.3);
            // Temporal lobe
            float tl=length(p-vec3(.85,-.3,.1))-0.45;
            float tr=length(p-vec3(-.85,-.3,.1))-0.45;
            d=smin(d,tl,0.25);
            d=smin(d,tr,0.25);
            // Occipital
            float oc=length(p-vec3(0,0,-.85))-0.55;
            d=smin(d,oc,0.3);
            // Cerebellum
            float cb=length(p-vec3(0,-.7,-.6))-0.4;
            d=smin(d,cb,0.15);
            // Brainstem
            float bs=length(vec2(length(p.xz),p.y+1.2)- vec2(0,0))-0.18;
            d=smin(d,bs,0.2);
            // Sulci (wrinkles)
            d+=sin(p.x*12.+t)*sin(p.y*10.)*sin(p.z*11.)*.02;
            d+=sin(p.x*20.+p.z*18.)*.008;
            return d;
        }

        void main(){
            vec2 uv=(gl_FragCoord.xy-.5*r)/r.y;
            vec3 ro=vec3(0,0,3.5);
            vec3 rd=normalize(vec3(uv,-1.5));

            // Slow auto-rotate
            float a=t*0.15;
            float ca=cos(a),sa=sin(a);
            rd.xz=mat2(ca,sa,-sa,ca)*rd.xz;
            ro.xz=mat2(ca,sa,-sa,ca)*ro.xz;

            float d=0.;
            vec3 p;
            for(int i=0;i<64;i++){
                p=ro+rd*d;
                float h=brain(p);
                if(h<.001||d>6.)break;
                d+=h*.7;
            }

            vec3 col=vec3(0);
            if(d<6.){
                // Normal estimation
                vec2 e=vec2(.001,0);
                vec3 n=normalize(vec3(
                    brain(p+e.xyy)-brain(p-e.xyy),
                    brain(p+e.yxy)-brain(p-e.yxy),
                    brain(p+e.yyx)-brain(p-e.yyx)
                ));
                // Lighting
                vec3 l=normalize(vec3(1,1,2));
                float diff=max(dot(n,l),0.);
                float fres=pow(1.-max(dot(-rd,n),0.),3.);

                // Neural pulse glow
                float pulse=sin(p.x*6.+p.y*5.+t*2.)*.5+.5;
                vec3 brainCol=mix(vec3(.25,.08,.45),vec3(.1,.02,.2),pulse);
                brainCol+=vec3(.4,.15,.7)*fres;
                brainCol+=vec3(.02,.8,.65)*pulse*0.15*diff;

                col=brainCol*(diff*0.6+0.4);
                col+=vec3(.65,.3,.95)*fres*0.4;
            }

            // Vignette
            vec2 vig=uv*1.2;
            col*=1.-dot(vig,vig)*0.3;

            gl_FragColor=vec4(col,d<6.?.35:0.);
        }`;

        function createShader(src, type) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            return s;
        }
        const prog = gl.createProgram();
        gl.attachShader(prog, createShader(vs, gl.VERTEX_SHADER));
        gl.attachShader(prog, createShader(fs, gl.FRAGMENT_SHADER));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const pLoc = gl.getAttribLocation(prog, 'p');
        gl.enableVertexAttribArray(pLoc);
        gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

        const uT = gl.getUniformLocation(prog, 't');
        const uR = gl.getUniformLocation(prog, 'r');

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        let startTime = Date.now();
        function frame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.uniform1f(uT, (Date.now() - startTime) * 0.001);
            gl.uniform2f(uR, canvas.width, canvas.height);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(frame);
        }
        frame();
    }

            neuralPill.style.borderColor = 'rgba(0,255,170,0.2)';
            neuralPill.style.color = 'var(--neon-emerald)';
        }

        // Tab bar
        const tabs = [
            { id: 'dashboard', label: t('tabDashboard') },
            { id: 'eeg', label: t('tabEEG') },
            { id: 'regions', label: t('tabRegions') },
            { id: 'pillars', label: t('tabPillars') },
            { id: 'neuromod', label: t('tabNeuromod') }
        ];

        let tabsHtml = '<div class="tab-bar">';
        tabs.forEach(tb => {
            tabsHtml += `<button class="tab-btn ${S.tab === tb.id ? 'active' : ''}" onclick="switchTab('${tb.id}')">${tb.label}</button>`;
        });

        // Cure / Restore button
        if (!S.cured && !S.transitioning) {
            tabsHtml += `<button class="action-btn" onclick="triggerCure()" style="margin-left:auto">⚡ ${t('btnCure')}</button>`;
        } else {
            tabsHtml += `<button class="action-btn secondary" onclick="restoreChaos()" style="margin-left:auto" ${S.transitioning ? 'disabled' : ''}>↺ ${t('btnRestore')}</button>`;
        }
        tabsHtml += '</div>';

        let content = tabsHtml;

        // ─── Shield Panel ───
        const isOk = S.seizureZScore < S.seizureThreshold;
        content += `
        <div class="shield-panel ${isOk ? 'safe' : 'alert'}">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <span class="mono" style="font-weight:800;color:${isOk ? 'var(--neon-emerald)' : 'var(--neon-rose)'};font-size:0.8rem;letter-spacing:1.5px">
                    ${isOk ? t('shieldActive') : t('shieldCompromised')}
                </span>
                <span class="mono" style="background:${isOk ? 'var(--neon-emerald)' : 'var(--neon-rose)'};color:${isOk ? '#000' : '#fff'};padding:3px 10px;font-size:0.6rem;font-weight:900;border-radius:5px;letter-spacing:1px">
                    ${isOk ? t('shieldEnforced') : t('shieldLockout')}
                </span>
            </div>
            <div style="margin-top:8px;font-size:0.8rem;color:var(--text-secondary);line-height:1.5">
                ${isOk ? t('shieldOkDesc') : t('shieldBadDesc')}
            </div>
        </div>`;

        // ─── TAB CONTENT ───
        if (S.tab === 'dashboard') content += renderDashboard();
        else if (S.tab === 'eeg') content += renderEEG();
        else if (S.tab === 'regions') content += renderRegions();
        else if (S.tab === 'pillars') content += renderPillars();
        else if (S.tab === 'neuromod') content += renderNeuromod();

        root.innerHTML = content;

        // Post-render: draw EEG canvases
        requestAnimationFrame(() => updateEEG());
    }

    // ═══════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', () => {
        render();
        initBrainShader();

        // Live EEG update loop
        setInterval(() => {
            // Gentle random drift of values
            S.icp = parseFloat((S.icp + (Math.random() - 0.5) * 0.3).toFixed(1));
            S.icp = Math.max(6, Math.min(20, S.icp));
            S.cbf = Math.round(Math.max(40, Math.min(65, S.cbf + (Math.random() - 0.5) * 2)));
            S.brainTemp = parseFloat((S.brainTemp + (Math.random() - 0.5) * 0.05).toFixed(1));
            S.brainTemp = Math.max(36.0, Math.min(38.5, S.brainTemp));

            // EEG band amplitudes drift
            S.delta = Math.max(5, Math.min(50, S.delta + (Math.random() - 0.5) * 2));
            S.theta = Math.max(5, Math.min(40, S.theta + (Math.random() - 0.5) * 2));
            S.alpha = Math.max(10, Math.min(60, S.alpha + (Math.random() - 0.5) * 3));
            S.beta = Math.max(10, Math.min(50, S.beta + (Math.random() - 0.5) * 2));
            S.gamma = Math.max(3, Math.min(30, S.gamma + (Math.random() - 0.5) * 1.5));

            // Region activity drift
            const regions = ['prefrontal','motor','temporal','occipital','parietal','hippocampus','amygdala','cerebellum','brainstem','thalamusActivity'];
            regions.forEach(r => {
                S[r] = Math.max(15, Math.min(98, S[r] + Math.round((Math.random() - 0.5) * 4)));
            });

            // NT drift
            if (!S.seizureActive) {
                S.dopamine = Math.max(30, Math.min(95, S.dopamine + Math.round((Math.random() - 0.5) * 2)));
                S.serotonin = Math.max(30, Math.min(95, S.serotonin + Math.round((Math.random() - 0.5) * 2)));
                S.acetylcholine = Math.max(25, Math.min(90, S.acetylcholine + Math.round((Math.random() - 0.5) * 2)));
                S.norepinephrine = Math.max(20, Math.min(85, S.norepinephrine + Math.round((Math.random() - 0.5) * 2)));
            }

            updateEEG();
            render();
        }, 800);
    });
    </script>
